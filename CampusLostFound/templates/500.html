{% extends 'base.html' %}
{% load static %}

{% block title %}System Error - DMMMSU Recovery{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex flex-col items-center justify-center text-center p-10">
    <div class="w-32 h-32 bg-slate-50 rounded-[3rem] flex items-center justify-center text-danger mb-8 animate-pulse shadow-inner">
        <i data-lucide="alert-triangle" class="w-16 h-16"></i>
    </div>
    <h1 class="text-6xl font-black text-text-main mb-4 tracking-tighter uppercase">500</h1>
    <h2 class="text-2xl font-black text-text-main mb-6 uppercase tracking-widest">Something went wrong</h2>
    <p class="text-text-light max-w-md mx-auto mb-10 font-bold leading-relaxed">
        Our system encountered an unexpected error. Don't worry, we're already looking into it. Please try again later.
    </p>
    <a href="{% url 'items:item_list' %}" class="btn btn-primary px-10 py-5 rounded-2xl shadow-premium">
        Back to Dashboard
    </a>
</div>
{% endblock %}
