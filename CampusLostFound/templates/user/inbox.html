{% extends base_template %}
{% load static %}

{% block title %}Messages - Recovery Hub{% endblock %}

{% block extra_head %}
<style>
    /* Integration Polish: Break out of standard page padding */
    .main-content { padding: 0 !important; }
    .content-container { max-width: none !important; margin: 0 !important; }
    .app-viewport { overflow: hidden !important; }
    
    .chat-container { 
        height: calc(100vh - 72px); /* Refined for safety */
        border-radius: 0; 
        border: none;
        background: white;
    }
    
    .bubble-in { background: #eaeff5; border-radius: 1.25rem 1.25rem 1.25rem 0; color: #0f172a; border: 1px solid rgba(0,0,0,0.03); }
    .bubble-out { background: var(--primary); border-radius: 1.25rem 1.25rem 0 1.25rem; color: white; }
    .chat-sidebar { background: white; border-right: 1px solid var(--border); }
    .chat-stage { background: #f8fafc; }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 5px; }
</style>
{% endblock %}

{% block breadcrumb_area %}{% endblock %}

{% block content %}
<div class="chat-container flex overflow-hidden shadow-sm" 
     x-init="if(window.lucide) lucide.createIcons()"
     x-data="{ 
        activeId: null,
        activeUser: null,
        messages: [],
        newMessage: '',
        loading: false,
        search: '',
        
        async loadChat(id) {
            this.loading = true;
            this.activeId = id;
            try {
                // Corrected endpoint path to match urls.py
                const r = await fetch(`/messages/${id}/`, {
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                
                if (!r.ok) throw new Error('API Error');
                
                const data = await r.json();
                this.messages = data.chat_messages || [];
                this.activeUser = data.other_user || { name: 'Unknown' };
                
                this.$nextTick(() => { 
                    this.scrollToBottom(); 
                    if(window.lucide) lucide.createIcons();
                });
            } catch (err) {
                console.error('Messaging Error:', err);
            } finally {
                this.loading = false;
            }
        },

        async send() {
            if(!this.newMessage.trim()) return;
            const content = this.newMessage;
            this.newMessage = '';
            
            const fd = new FormData();
            fd.append('recipient_id', this.activeId);
            fd.append('content', content);
            fd.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            const r = await fetch('{% url 'items:send_message_api' %}', {
                method: 'POST',
                body: fd,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            
            if(r.ok) {
                this.loadChat(this.activeId);
            }
        },

        scrollToBottom() {
            const el = this.$refs.scrollArea;
            if(el) el.scrollTop = el.scrollHeight;
        }
     }">
    
    <!-- Unified Sidebar Integration -->
    <div class="chat-sidebar w-80 shrink-0 flex flex-col">
        <!-- Search Bar: System Style -->
        <div class="p-6">
            <div class="relative group">
                <input type="text" x-model="search" placeholder="Search contacts..." 
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-4 text-sm font-medium text-secondary placeholder-slate-400 focus:bg-white focus:border-primary/30 focus:ring-4 focus:ring-primary/5 transition-all outline-none">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-primary transition-colors"></i>
            </div>
        </div>

        <!-- Contact List -->
        <div class="flex-1 overflow-y-auto custom-scrollbar">
            {% for conv in threads %}
            <button @click="loadChat({{ conv.user.id }})" 
                    x-show="'{{ conv.user.username }}'.toLowerCase().includes(search.toLowerCase())"
                    class="w-full flex items-center gap-4 px-6 py-5 transition-all text-left group border-b border-slate-50"
                    :class="activeId === {{ conv.user.id }} ? 'bg-primary-light/30 border-primary/10' : 'hover:bg-slate-50'">
                
                <div class="relative shrink-0">
                    <div class="w-14 h-14 rounded-2xl overflow-hidden bg-slate-100 border-2 border-transparent group-hover:border-primary/20 transition-all"
                         :class="activeId === {{ conv.user.id }} ? 'border-primary/30' : ''">
                        {% if conv.user.userprofile.avatar %}
                        <img src="{{ conv.user.userprofile.avatar.url }}" class="w-full h-full object-cover">
                        {% else %}
                        <div class="w-full h-full flex items-center justify-center text-primary/40 font-black uppercase text-lg bg-primary/5">{{ conv.user.username|slice:":1" }}</div>
                        {% endif %}
                    </div>
                    <!-- Status Indicator overlay -->
                    <div class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-white p-1 shadow-sm">
                        <div class="w-full h-full rounded-full bg-success"></div>
                    </div>
                </div>

                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[0.95rem] font-black text-secondary truncate group-hover:text-primary transition-colors">@{{ conv.user.username }}</span>
                        <span class="text-[0.65rem] font-black text-slate-400 uppercase tracking-widest">{{ conv.last_message.created_at|timesince }} ago</span>
                    </div>
                    <p class="text-[0.75rem] text-slate-500 truncate font-bold opacity-70">
                        {{ conv.last_message.content|default:"No Pulse Detections" }}
                    </p>
                </div>
            </button>
            {% endfor %}
        </div>
    </div>

    <!-- Active Chat Stage -->
    <div class="chat-stage flex-1 flex flex-col relative">
        <template x-if="!activeId">
            <div class="flex-1 flex flex-col items-center justify-center p-20 text-center animate-fade-in">
                <div class="w-24 h-24 bg-white rounded-3xl shadow-xl flex items-center justify-center text-primary/20 mb-6 transform rotate-3 hover:rotate-0 transition-transform">
                    <i data-lucide="message-square" class="w-12 h-12"></i>
                </div>
                <h3 class="text-xl font-black text-secondary uppercase tracking-tight">Syncing Ready</h3>
                <p class="text-sm font-bold text-slate-400 mt-2 max-w-xs leading-relaxed">Select a registered contact to begin real-time ownership coordination.</p>
            </div>
        </template>

        <template x-if="activeId">
            <div class="flex flex-col h-full bg-white/50 backdrop-blur-sm shadow-inner">
                <!-- Chat Header: Brand Navigation -->
                <nav class="flex justify-between items-center px-8 py-5 border-b border-slate-100 bg-white/80">
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <template x-if="activeUser?.avatar">
                                <img :src="activeUser.avatar" class="w-12 h-12 rounded-2xl border-2 border-primary/10 shadow-sm">
                            </template>
                            <template x-if="!activeUser?.avatar">
                                <div class="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 border-2 border-primary/10 shadow-sm flex items-center justify-center font-black text-lg uppercase" x-text="activeUser?.name?.slice(0,1)"></div>
                            </template>
                            <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-success rounded-full border-2 border-white shadow-sm"></div>
                        </div>
                        <div>
                            <h2 class="text-[1.1rem] font-black text-secondary tracking-tight" x-text="'@' + activeUser?.name"></h2>
                            <div class="flex items-center gap-2">
                                <div class="w-1.5 h-1.5 rounded-full bg-success animate-pulse"></div>
                                <p class="text-[0.7rem] font-black text-slate-400 uppercase tracking-widest" x-text="messages.length + ' Pulse detections confirmed'"></p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <!-- Removed non-functional placeholders per user request -->
                    </div>
                </nav>

                <!-- Message Wall -->
                <div x-ref="scrollArea" class="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar">
                    <template x-for="msg in messages" :key="msg.id">
                        <div class="flex items-start gap-4 animate-in slide-in-from-bottom-2" :class="msg.is_me ? 'flex-row-reverse' : ''">
                            <div class="shrink-0 pt-1">
                                <template x-if="msg.is_me">
                                    <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 font-bold uppercase text-xs border-2 border-white shadow-md">
                                        {% if current_user_profile and current_user_profile.avatar %}
                                            <img src="{{ current_user_profile.avatar.url }}" class="w-full h-full object-cover rounded-xl">
                                        {% else %}
                                            {{ user.username|slice:":1" }}
                                        {% endif %}
                                    </div>
                                </template>
                                <template x-if="!msg.is_me">
                                    <div class="w-10 h-10 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-500 font-bold uppercase text-xs border-2 border-white shadow-md">
                                        <template x-if="activeUser?.avatar">
                                            <img :src="activeUser.avatar" class="w-full h-full object-cover rounded-xl">
                                        </template>
                                        <template x-if="!activeUser?.avatar">
                                            <span x-text="activeUser?.name?.slice(0,1)"></span>
                                        </template>
                                    </div>
                                </template>
                            </div>
                            <div class="max-w-[70%] group">
                                <div class="px-5 py-3.5 text-[0.93rem] font-bold shadow-sm"
                                     :class="msg.is_me ? 'bubble-out' : 'bubble-in'">
                                    <p x-text="msg.content" class="leading-relaxed"></p>
                                </div>
                                <p class="text-[0.65rem] font-black text-slate-400 mt-2 px-1 opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-tighter" 
                                   :class="msg.is_me ? 'text-right' : 'text-left'"
                                   x-text="msg.time"></p>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="p-8 bg-white border-t border-slate-100">
                    <form @submit.prevent="send()" class="flex items-center gap-4 bg-slate-50 border border-slate-200 rounded-[1.25rem] p-2 pr-2 shadow-inner group focus-within:bg-white focus-within:border-primary/20 transition-all">
                        <input type="text" x-model="newMessage" placeholder="Coordinate your return sync..." 
                               class="flex-1 bg-transparent border-none text-[0.95rem] font-bold text-secondary placeholder-slate-400 outline-none pl-4">
                        <button type="submit" class="w-14 h-12 flex items-center justify-center bg-primary text-white hover:bg-primary-hover shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all rounded-[1rem]">
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </button>
                    </form>
                </div>
            </div>
        </template>
    </div>
</div>
{% endblock %}
