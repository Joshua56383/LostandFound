{% load static %}
<header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-border px-4 py-3 sm:px-8 sm:py-3 flex items-center justify-between transition-all shadow-sm">
    
    <!-- Mobile Hamburger & Brand (Hidden on Desktop) -->
    <div class="flex items-center gap-4 lg:hidden">
        <button class="w-10 h-10 flex items-center justify-center text-text-main bg-slate-50 border border-border rounded-xl active:scale-95 transition-all" @click="sidebarOpen = true">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center border border-primary/20">
                <i data-lucide="package" class="w-4 h-4 text-primary"></i>
            </div>
            <span class="font-black tracking-tight text-lg text-text-main">DMMMSU</span>
        </div>
    </div>

    <!-- Global Search -->
    <div class="hidden lg:flex flex-1 max-w-xl mx-0">
        <form action="{% url 'items:item_list' %}" method="get" class="w-full relative group">
            <i data-lucide="search" class="w-4 h-4 text-text-light absolute left-4 top-1/2 -translate-y-1/2 group-focus-within:text-primary transition-colors"></i>
            <input type="text" name="q" placeholder="Search for items, colors, or buildings..." class="w-full bg-slate-50/50 border border-slate-200 text-sm font-medium text-text-main rounded-[1rem] pl-11 pr-4 py-2.5 outline-none focus:bg-white focus:border-primary/30 focus:ring-4 focus:ring-primary/5 transition-all shadow-inner">
        </form>
    </div>

    <!-- Spacer for mobile flex balance -->
    <div class="flex-1 lg:hidden"></div>

    <!-- Actions & Profile -->
    <div class="flex items-center gap-2 sm:gap-4">
        <!-- Primary Actions Group (Visible to everyone) -->
        <div class="hidden sm:flex items-center gap-2">
            <!-- Report Lost -->
            <button @click.prevent="{% if user.is_authenticated %}openModal('', '{% url 'items:add_item' %}?type=lost', 'max-w-4xl'){% else %}window.location.href='{% url 'login' %}?next={% url 'items:add_item' %}'{% endif %}" 
                    class="flex items-center gap-2 h-10 sm:h-11 px-6 rounded-xl bg-white border border-border text-secondary text-[10px] sm:text-[11px] font-black uppercase tracking-widest hover:bg-slate-50 hover:border-secondary/20 transition-all active:scale-95">
                <i data-lucide="search" class="w-4 h-4"></i>
                <span>Report Lost</span>
            </button>

            <!-- Report Found -->
            <button @click.prevent="{% if user.is_authenticated %}openModal('', '{% url 'items:add_item' %}?type=found', 'max-w-4xl'){% else %}window.location.href='{% url 'login' %}?next={% url 'items:add_item' %}'{% endif %}" 
                    class="flex items-center gap-2 h-10 sm:h-11 px-6 rounded-xl bg-primary text-white text-[10px] sm:text-[11px] font-black uppercase tracking-widest hover:bg-primary-hover shadow-lg shadow-primary/20 transition-all active:scale-95">
                <i data-lucide="plus-circle" class="w-4 h-4"></i>
                <span>Report Found</span>
            </button>
        </div>

        {% if user.is_authenticated %}
        <!-- Notifications -->
        <button @click.prevent="openModal('', '{% url 'items:notifications' %}', 'max-w-2xl')" 
                class="relative w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-xl hover:bg-slate-50 text-text-light hover:text-primary transition-colors active:scale-95">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <!-- Simulated Badge -->
            <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-secondary rounded-full border-2 border-white shadow-sm"></span>
        </button>

        <!-- Inbox -->
        <button @click="window.location.href='{% url 'items:inbox' %}'" 
                class="relative w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-xl hover:bg-slate-50 text-text-light hover:text-primary transition-colors active:scale-95">
            <i data-lucide="message-square" class="w-5 h-5"></i>
        </button>

        {% else %}
        <!-- Guest Login Link -->
        <a href="{% url 'login' %}" class="btn-premium px-6 py-2.5 bg-secondary text-white text-[11px] font-black uppercase tracking-widest rounded-xl hover:brightness-110 shadow-lg shadow-secondary/10 transition-all active:scale-95">
            Sign In
        </a>
        {% endif %}
    </div>
</header>
