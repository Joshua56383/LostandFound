<!-- Dark Mode Toggle Component -->
<button @click="toggleDarkMode()" 
    class="relative w-14 h-8 flex items-center bg-gray-200 dark:bg-primary/20 rounded-full p-1 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary/20 group hover:shadow-lg"
    aria-label="Toggle Navigation Theme">
    
    <!-- Track Inner -->
    <div class="absolute inset-x-2 flex justify-between items-center pointer-events-none">
        <i data-lucide="sun" class="w-3 h-3 text-amber-500 opacity-0 dark:opacity-40 transition-opacity"></i>
        <i data-lucide="moon" class="w-3 h-3 text-blue-400 opacity-40 dark:opacity-0 transition-opacity"></i>
    </div>

    <!-- Thumb -->
    <div class="w-6 h-6 bg-white dark:bg-primary rounded-full shadow-md transform transition-transform duration-300 flex items-center justify-center border border-gray-100 dark:border-primary/20"
        :class="darkMode ? 'translate-x-6' : 'translate-x-0'">
        
        <i data-lucide="sun" x-show="!darkMode" class="w-3 h-3 text-amber-500"></i>
        <i data-lucide="moon" x-show="darkMode" class="w-3 h-3 text-white" style="display:none;"></i>
    </div>
</button>
