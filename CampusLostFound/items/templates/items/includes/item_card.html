<!-- items/templates/items/includes/item_card.html -->
<div class="group flex flex-col bg-white rounded-2xl border border-gray-100 overflow-hidden hover:shadow-xl hover:shadow-gray-200/50 transition-all duration-300 cursor-pointer break-inside-avoid mb-6"
    @click="openDetails({{ item.id }})">

    <div class="relative aspect-[4/3] w-full overflow-hidden bg-gray-50">
        {% if item.image %}
        <img src="{{ item.image.url }}" alt="{{ item.name }}"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ease-out" />
        {% else %}
        <!-- Placeholder if no image -->
        <img src="https://images.unsplash.com/photo-1533696848654-6bdf438edea4?auto=format&fit=crop&q=80&w=1080"
            alt="{{ item.name }}"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ease-out" />
        {% endif %}

        <div class="absolute top-3 left-3 flex gap-2 z-10">
            <span
                class="px-2.5 py-1 text-xs font-semibold rounded-full shadow-sm backdrop-blur-md flex items-center gap-1.5 {% if item.status == 'lost' %}bg-red-500/90 text-white{% else %}bg-emerald-500/90 text-white{% endif %}">
                {% if item.status == 'lost' %}
                <i data-lucide="circle-alert" class="w-3.5 h-3.5"></i> Lost
                {% else %}
                <i data-lucide="circle-check" class="w-3.5 h-3.5"></i> Found
                {% endif %}
            </span>
        </div>
    </div>

    <div class="p-5 flex flex-col flex-grow">
        <div class="flex items-start justify-between mb-1.5">
            <h3 class="font-bold text-gray-900 text-lg leading-tight line-clamp-1">{{ item.name }}</h3>
        </div>

        <p class="text-sm text-gray-500 line-clamp-2 mb-4 leading-relaxed flex-grow">
            {{ item.description|truncatewords:12 }}
        </p>

        <div class="space-y-2 mb-5">
            <div class="flex items-center text-xs text-gray-500 gap-2">
                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-gray-400"></i>
                <span class="font-medium truncate">{{ item.location }}</span>
            </div>
            <div class="flex items-center text-xs text-gray-500 gap-2">
                <i data-lucide="calendar" class="w-3.5 h-3.5 text-gray-400"></i>
                <span class="font-medium">{{ item.date_reported|date:"M d, Y" }}</span>
            </div>
        </div>

        <div class="pt-4 border-t border-gray-100 flex items-center justify-between">
            <span
                class="inline-flex items-center gap-1.5 text-xs font-semibold text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md">
                {{ item.category }}
            </span>
            <button
                class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-gray-900 group-hover:text-white transition-colors"
                aria-label="View details">
                <i data-lucide="more-horizontal" class="w-4 h-4"></i>
            </button>
        </div>
    </div>
</div>
