<!-- Sidebar -->
<aside class="w-64 bg-[#0f172a] text-white flex flex-col shrink-0 transition-all duration-300"
    :class="sidebarOpen ? 'w-64' : 'w-20'">

    <!-- Sidebar Brand -->
    <div class="p-6 flex items-center gap-3 border-b border-white/5">
        <div
            class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-indigo-600/20">
            <i data-lucide="shield" class="w-5 h-5 text-white"></i>
        </div>
        <div x-show="sidebarOpen" x-transition.opacity>
            <h1 class="font-bold text-lg leading-tight">Admin Portal</h1>
            <p class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold">Control Center</p>
        </div>
    </div>

    <!-- Sidebar Navigation -->
    <nav class="flex-1 px-4 py-8 space-y-2">
        <p x-show="sidebarOpen" class="px-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Menu</p>

        <a href="{% url 'items:dashboard' %}"
            class="flex items-center gap-3 px-4 py-3 rounded-xl {% if request.resolver_match.url_name == 'dashboard' %}bg-indigo-600/10 text-indigo-400 border border-indigo-600/20{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %} transition-all group">
            <i data-lucide="layout-grid" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
            <span x-show="sidebarOpen" class="font-bold text-sm">Database Records</span>
        </a>

        <a href="{% url 'items:user_directory' %}"
            class="flex items-center gap-3 px-4 py-3 rounded-xl {% if request.resolver_match.url_name == 'user_directory' %}bg-indigo-600/10 text-indigo-400 border border-indigo-600/20{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %} transition-all group">
            <i data-lucide="users" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
            <span x-show="sidebarOpen" class="font-bold text-sm">User Directory</span>
        </a>

        <a href="{% url 'items:admin_analytics' %}"
            class="flex items-center gap-3 px-4 py-3 rounded-xl {% if request.resolver_match.url_name == 'admin_analytics' %}bg-indigo-600/10 text-indigo-400 border border-indigo-600/20{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %} transition-all group">
            <i data-lucide="trending-up" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
            <span x-show="sidebarOpen" class="font-bold text-sm">Analytics</span>
        </a>

        <a href="{% url 'items:audit_logs' %}"
            class="flex items-center gap-3 px-4 py-3 rounded-xl {% if request.resolver_match.url_name == 'audit_logs' %}bg-indigo-600/10 text-indigo-400 border border-indigo-600/20{% else %}text-gray-400 hover:bg-white/5 hover:text-white{% endif %} transition-all group">
            <i data-lucide="list-checks" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
            <span x-show="sidebarOpen" class="font-bold text-sm">Audit Logs</span>
        </a>
    </nav>

    <!-- Sidebar Footer (Logout) -->
    <div class="p-4 border-t border-white/5">
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-all group">
                <i data-lucide="log-out" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                <span x-show="sidebarOpen" class="font-bold text-sm">Secure Logout</span>
            </button>
        </form>
    </div>
</aside>
